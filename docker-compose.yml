version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: ones-ai-workflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ones_ai_workflow
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
